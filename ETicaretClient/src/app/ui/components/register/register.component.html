<div class="row" id="registerContainer">
    <div class="col-md-3"></div>
    <div class="col-md-6">
        <form [formGroup]="frm" (ngSubmit)="onSubmit(frm.value)">
            <div class="mb-3">
                <label for="adSoyad" class="form-label">Ad Soyad</label>
                <input type="text" class="form-control" id="adSoyad" placeholder="Ad Soyad" formControlName="adSoyad"
                    [ngClass]="{'is-invalid': submitted && component.adSoyad.errors}">
                <div class="form-text" *ngIf="submitted && component.adSoyad.errors?.required">Ad Soyad boş bırakılamaz.
                </div>
                <div class="form-text"
                    *ngIf="submitted && (component.adSoyad.errors?.minlength || component.adSoyad.errors?.maxlength)">Ad
                    Soyad alanı 3-50 karakter aralığında olmalıdır.</div>
            </div>

            <div class="mb-3">
                <label for="kullaniciAdi" class="form-label">Kullanıcı Adı</label>
                <input type="text" class="form-control" id="kullaniciAdi" placeholder="Kullanıcı Adı"
                    formControlName="kullaniciAdi"
                    [ngClass]="{'is-invalid': submitted && component.kullaniciAdi.errors}">
                <div class="form-text" *ngIf="submitted && component.kullaniciAdi.errors?.required">Kullanıcı Adı boş
                    bırakılamaz.</div>
            </div>

            <div class="mb-3">
                <label for="sifre" class="form-label">Şifre</label>
                <input type="password" class="form-control" id="sifre" placeholder="Şifre" formControlName="sifre"
                    [ngClass]="{'is-invalid': submitted && component.sifre.errors}">
            </div>

            <div class="mb-3">
                <label for="sifreTekrar" class="form-label">Şifre Tekrar</label>
                <input type="password" class="form-control" id="sifreTekrar" placeholder="Şifre Tekrar"
                    formControlName="sifreTekrar" [ngClass]="{'is-invalid': submitted && component.sifreTekrar.errors}">
                <div class="form-text" *ngIf="submitted &&  frm.hasError('notSame')">Lütfen şifreyi doğrulayınız.</div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Email" formControlName="email"
                    [ngClass]="{'is-invalid': submitted && component.email.errors}">
                <div class="form-text" *ngIf="submitted && component.email.errors?.required">Email boş bırakılamaz.
                </div>
                <div class="form-text" *ngIf="submitted && component.email.errors?.email">Lütfen email formatında
                    giriniz.</div>
            </div>

            <button type="submit" class="btn btn-primary">Kayıt Ol</button>
        </form>
    </div>
    <div class="col-md-3"></div>
</div>
