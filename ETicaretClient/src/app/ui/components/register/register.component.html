<div class="row" id="registerContainer">
    <div class="col-md-3"></div>
    <div class="col-md-6">
        <form [formGroup]="frm" (ngSubmit)="onSubmit(frm.value)">
            <div class="mb-3">
                <label for="nameSurname" class="form-label">Ad Soyad</label>
                <input type="text" class="form-control" id="nameSurname" placeholder="Ad Soyad" formControlName="nameSurname"
                    [ngClass]="{'is-invalid': submitted && component.nameSurname.errors}">
                <div class="form-text" *ngIf="submitted && component.nameSurname.errors?.required">Ad Soyad boş bırakılamaz.
                </div>
                <div class="form-text"
                    *ngIf="submitted && (component.nameSurname.errors?.minlength || component.nameSurname.errors?.maxlength)">Ad
                    Soyad alanı 3-50 karakter aralığında olmalıdır.</div>
            </div>

            <div class="mb-3">
                <label for="userName" class="form-label">Kullanıcı Adı</label>
                <input type="text" class="form-control" id="userName" placeholder="Kullanıcı Adı"
                    formControlName="userName"
                    [ngClass]="{'is-invalid': submitted && component.userName.errors}">
                <div class="form-text" *ngIf="submitted && component.userName.errors?.required">Kullanıcı Adı boş
                    bırakılamaz.</div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Şifre</label>
                <input type="password" class="form-control" id="password" placeholder="Şifre" formControlName="password"
                    [ngClass]="{'is-invalid': submitted && component.password.errors}">
            </div>

            <div class="mb-3">
                <label for="passwordConfirm" class="form-label">Şifre Tekrar</label>
                <input type="password" class="form-control" id="passwordConfirm" placeholder="Şifre Tekrar"
                    formControlName="passwordConfirm" [ngClass]="{'is-invalid': submitted && component.passwordConfirm.errors}">
                <div class="form-text" *ngIf="submitted &&  frm.hasError('notSame')">Lütfen şifreyi doğrulayınız.</div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Email" formControlName="email"
                    [ngClass]="{'is-invalid': submitted && component.email.errors}">
                <div class="form-text" *ngIf="submitted && component.email.errors?.required">Email boş bırakılamaz.
                </div>
                <div class="form-text" *ngIf="submitted && component.email.errors?.email">Lütfen email formatında
                    giriniz.</div>
            </div>

            <button type="submit" class="btn btn-primary">Kayıt Ol</button>
        </form>
    </div>
    <div class="col-md-3"></div>
</div>
