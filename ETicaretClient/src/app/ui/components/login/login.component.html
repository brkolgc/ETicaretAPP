<div class="row" id="loginContainer">
    <div class="col-md-3"></div>
    <div class="col-md-6">
        <div class="mb-3">
            <label for="userName" class="form-label">Kullanıcı Adı</label>
            <input #txtUserNameOrEmail type="text" class="form-control" id="userName"
                placeholder="Kullanıcı Adı & Email">
            <div class="form-text">*****</div>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Şifre</label>
            <input #txtPassword type="password" class="form-control" id="password" placeholder="Şifre">
        </div>

        <div class="divLoginButtons">
            <asl-google-signin-button class="btnGoogle"></asl-google-signin-button>
            <img class="btnFacebook" src="../assets/facebook.png" (click)="facebookLogin()">
        </div>

        <button type="submit" class="btn btn-primary" id="btnLogin"
            (click)="login(txtUserNameOrEmail.value,txtPassword.value)">Giriş
            Yap</button>
    </div>
    <div class="col-md-3"></div>
</div>
